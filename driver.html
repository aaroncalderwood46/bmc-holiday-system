<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMC | Request Holidays</title>
<style>
  :root{ --red:#c8102e; --red-dark:#9d0c24; --black:#111; --border:#e2e2e4; --muted:#6b6b70; --ok:#1a7f3c; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif; background:#f4f4f5; color:#1c1c1e; font-size:17px;}
  header{background:var(--black); color:#fff; padding:18px 20px; text-align:center;}
  header h1{font-size:18px; letter-spacing:.3px;}
  header h1 span{color:var(--red);}
  main{max-width:460px; margin:0 auto; padding:20px 16px 60px;}
  .card{background:#fff; border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px;}
  label{display:block; font-size:14px; font-weight:700; margin:16px 0 6px;}
  label:first-child{margin-top:0;}
  select,input,textarea{width:100%; padding:14px; border:1px solid var(--border); border-radius:10px; font-size:17px; background:#fff;}
  textarea{resize:none; height:70px;}
  button{width:100%; padding:16px; border:none; border-radius:10px; font-size:17px; font-weight:700; cursor:pointer; margin-top:18px;}
  .btn-red{background:var(--red); color:#fff;}
  .btn-red:active{background:var(--red-dark);}
  .btn-red:disabled{background:#ccc;}
  .msg{margin-top:14px; padding:14px; border-radius:10px; font-size:15px; display:none;}
  .msg.bad{display:block; background:#fee2e2; color:#9d0c24;}
  .msg.good{display:block; background:#dcfce7; color:var(--ok);}
  .msg.warn{display:block; background:#fef3c7; color:#92400e;}
  .mine{font-size:15px;}
  .mine .item{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);}
  .mine .item:last-child{border:none;}
  .pill{font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px; align-self:center;}
  .pill.pending{background:#fef3c7; color:#92400e;}
  .pill.approved{background:#dcfce7; color:var(--ok);}
  h2{font-size:16px; margin-bottom:8px;}
  .muted{color:var(--muted); font-size:13px; margin-top:8px;}
  .loading{text-align:center; padding:40px; color:var(--muted);}
</style>
</head>
<body>

<header><h1>BELFAST <span>MINI COACH</span><br><small style="font-weight:400;font-size:13px;color:#bbb">Holiday Requests</small></h1></header>

<main>
  <div class="loading" id="loading">Loading...</div>

  <div id="app" style="display:none">
    <div class="card">
      <label>Your name</label>
      <select id="who"></select>

      <label>First day off</label>
      <input type="date" id="start">

      <label>Last day off</label>
      <input type="date" id="end">

      <label>Reason (optional)</label>
      <textarea id="note" placeholder="e.g. family wedding"></textarea>

      <button class="btn-red" id="sendBtn" onclick="send()">Send request</button>
      <div class="msg" id="msg"></div>
      <p class="muted">Your request goes to the office for approval. You will be told in person or by text.</p>
    </div>

    <div class="card">
      <h2>Your requests</h2>
      <div class="mine" id="mine"><span class="muted">Pick your name above to see them.</span></div>
    </div>
  </div>
</main>

<script>
// PASTE YOUR WORKER URL HERE (no trailing slash)
const API = 'https://bmc-holiday-requests.aaronc761.workers.dev';

let data = null;

function parseD(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmt(d){ return d.toISOString().slice(0,10); }
function nice(s){ return parseD(s).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function isWeekend(d){ return d.getDay()===0||d.getDay()===6; }

async function load(){
  try{
    const r = await fetch(API + '/public');
    data = await r.json();
    const sel = document.getElementById('who');
    const savedId = localStorage.getItem('bmc_driver_id');
    sel.innerHTML = '<option value="">Select your name...</option>' +
      data.staff.map(s=>`<option value="${s.id}" ${s.id===savedId?'selected':''}>${s.name}</option>`).join('');
    sel.onchange = renderMine;
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    renderMine();
  }catch(e){
    document.getElementById('loading').textContent='Could not load. Check your connection and refresh.';
  }
}

function renderMine(){
  const id = document.getElementById('who').value;
  if(id) localStorage.setItem('bmc_driver_id', id);
  const box = document.getElementById('mine');
  if(!id){ box.innerHTML='<span class="muted">Pick your name above to see them.</span>'; return; }
  const mine = data.requests.filter(r=>r.staffId===id).sort((a,b)=>a.start<b.start?1:-1);
  box.innerHTML = mine.length
    ? mine.map(r=>`<div class="item"><span>${nice(r.start)} to ${nice(r.end)}</span><span class="pill ${r.status}">${r.status}</span></div>`).join('')
    : '<span class="muted">No requests yet.</span>';
}

// soft clash check so drivers see busy dates before submitting
function clashWarning(id, start, end){
  const me = data.staff.find(s=>s.id===id);
  let d = parseD(start), endD = parseD(end), busy = [];
  while(d <= endD){
    const ds = fmt(d);
    if(!(data.settings.weekends==='no' && isWeekend(d))){
      const off = data.requests.filter(r=>r.status==='approved' && ds>=r.start && ds<=r.end && r.staffId!==id);
      const driversOff = off.filter(r=>(data.staff.find(s=>s.id===r.staffId)||{}).role==='Driver').length
        + (me && me.role==='Driver' ? 1 : 0);
      if(off.length+1 > data.settings.maxAll || (data.settings.maxDrivers>0 && driversOff > data.settings.maxDrivers))
        busy.push(nice(ds));
    }
    d.setDate(d.getDate()+1);
  }
  return busy;
}

async function send(){
  const id = document.getElementById('who').value;
  const start = document.getElementById('start').value;
  const end = document.getElementById('end').value;
  const note = document.getElementById('note').value.trim();
  const msg = document.getElementById('msg');
  const btn = document.getElementById('sendBtn');
  msg.className = 'msg';

  if(!id){ msg.className='msg bad'; msg.textContent='Pick your name first.'; return; }
  if(!start || !end || end < start){ msg.className='msg bad'; msg.textContent='Check your dates.'; return; }
  if(start < fmt(new Date())){ msg.className='msg bad'; msg.textContent='Dates are in the past.'; return; }

  const busy = clashWarning(id, start, end);
  if(busy.length && !confirm('Heads up: ' + busy.slice(0,4).join(', ') + (busy.length>4?' and more':'') + ' already look full. Your request may be declined. Send anyway?')) return;

  btn.disabled = true; btn.textContent = 'Sending...';
  try{
    const r = await fetch(API + '/request', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({staffId:id, start, end, note})
    });
    const res = await r.json();
    if(res.ok){
      msg.className='msg good'; msg.textContent='Request sent. The office will confirm.';
      document.getElementById('start').value=''; document.getElementById('end').value=''; document.getElementById('note').value='';
      await load();
    } else {
      msg.className='msg bad'; msg.textContent=res.error || 'Something went wrong.';
    }
  }catch(e){
    msg.className='msg bad'; msg.textContent='Could not send. Check your connection.';
  }
  btn.disabled=false; btn.textContent='Send request';
}

load();
</script>
</body>
</html>
